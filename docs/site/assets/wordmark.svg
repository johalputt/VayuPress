<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" fill="none" role="img" aria-label="VayuPress">
  <defs>
    <linearGradient id="wg" x1="0" y1="0" x2="1" y2="0.6">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1746a2"/>
    </linearGradient>
  </defs>

  <!-- ── Mark (compact) ── -->
  <!-- Left V arm -->
  <path fill="white" d="M 10 14 L 55 14 L 90 154 L 72 154 Z"/>
  <!-- Right lower arm -->
  <path fill="white" d="M 72 154 L 90 154 L 116 76 L 100 67 Z"/>
  <!-- Wind streak 1 -->
  <path fill="url(#wg)"
    d="M 100 14 C 116 10,140 12,168 20 C 175 22,175 28,170 31 C 160 34,140 32,118 38 C 112 40,108 37,110 33 C 120 30,140 29,158 25 C 146 21,126 20,106 23 C 102 19,100 15,100 14 Z"/>
  <!-- Wind streak 2 -->
  <path fill="url(#wg)"
    d="M 104 42 C 120 38,144 40,172 48 C 179 51,179 57,172 60 C 162 63,140 61,118 67 C 112 69,107 66,109 61 C 122 58,142 57,162 53 C 148 49,128 48,108 52 C 104 47,104 43,104 42 Z"/>
  <!-- Wind streak 3 -->
  <path fill="url(#wg)"
    d="M 108 70 C 124 66,148 68,174 78 C 181 81,180 87,173 90 C 162 93,140 91,118 97 C 112 99,107 96,110 91 C 124 87,144 86,166 82 C 150 78,130 77,112 81 C 106 76,107 71,108 70 Z"/>

  <!-- ── Wordmark text ── -->
  <!-- VAYU in white, wide-tracked -->
  <text x="194" y="112"
    font-family="'Space Grotesk', 'Inter', sans-serif"
    font-weight="700"
    font-size="88"
    letter-spacing="6"
    fill="white">VAYU</text>

  <!-- PRESS in blue gradient -->
  <text x="478" y="112"
    font-family="'Space Grotesk', 'Inter', sans-serif"
    font-weight="700"
    font-size="88"
    letter-spacing="6"
    fill="#3b82f6">PRESS</text>

  <!-- Tagline (optional, tiny) -->
  <text x="194" y="148"
    font-family="'JetBrains Mono', monospace"
    font-weight="400"
    font-size="16"
    letter-spacing="4"
    fill="rgba(255,255,255,0.3)">sovereign publishing engine</text>
</svg>
