name: Bug Report
description: Report a bug or unexpected behavior in VayuPress
title: "[Bug]: "
labels: ["bug", "needs-triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill in as much detail as possible.
        **Security vulnerabilities** → email security@vayupress.com instead.

  - type: input
    id: version
    attributes:
      label: VayuPress Version
      description: Run `./vayupress --version` or check your deploy script
      placeholder: "e.g. 1.0.0-p8"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g. Ubuntu 24.04 LTS"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Clear description of what happened vs. what you expected
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue
      placeholder: |
        1. Deploy with `sudo ./scripts/deploy-vayupress.sh`
        2. POST to /api/v1/articles with ...
        3. See error in logs
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste relevant log output (JSON format). Redact API keys and secrets.
      render: json

  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      options:
        - Write Queue
        - Cache / Rendering
        - Search (Meilisearch)
        - Database (SQLite)
        - API
        - Deploy Script
        - Nginx / TLS
        - Authentication / Security
        - Media / Storage
        - Health Checks
        - Other
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: This is not a security vulnerability (those go to security@vayupress.com)
          required: true
        - label: I have redacted any secrets or personal data from my report
          required: true
