name: CI — VayuPress Governance Constitution v6.0 Enforcement

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

# ─────────────────────────────────────────────────────────────
# PROMPT 10: AUTOMATED GOVERNANCE ENFORCEMENT
# Every rule that can be automated MUST be automated.
# "If it can't pass CI, it doesn't merge."
# ─────────────────────────────────────────────────────────────

jobs:

  # ── P10: Required documentation check (FAIL if missing) ───────────────────
  check-docs:
    name: "P10 · Required Docs"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Verify all required documentation files exist
        run: |
          MISSING=0
          REQUIRED=(
            README.md CHANGELOG.md SECURITY.md GOVERNANCE.md
            ETHICS.md CONTRIBUTING.md CODE_OF_CONDUCT.md
            docs/INSTALLATION.md docs/API-REFERENCE.md
            docs/ARCHITECTURE.md docs/DEVELOPMENT.md
            docs/OPERATIONS.md docs/RELEASES.md
            docs/CI-GOVERNANCE.md docs/THREAT-MODEL.md
            docs/MAINTAINERS.md docs/SUSTAINABILITY.md
            docs/ETHICAL-REVIEW-PROCESS.md
            GOVERNANCE-CONSTITUTION.md
          )
          for f in "${REQUIRED[@]}"; do
            if [ ! -f "$f" ]; then
              echo "❌ MISSING: $f"
              MISSING=1
            else
              echo "✅ OK: $f"
            fi
          done
          [ $MISSING -eq 0 ] || { echo ""; echo "FAIL: Required documentation files missing (Prompt 7/10)."; exit 1; }

  # ── P10: Shell script linting (FAIL on warnings+) ─────────────────────────
  lint-shell:
    name: "P10 · Shell Lint (shellcheck)"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Lint all shell scripts
        run: |
          find scripts/ -name "*.sh" -exec shellcheck --severity=warning {} \;
          echo "✅ Shell lint passed."

  # ── P10: Markdown linting ──────────────────────────────────────────────────
  lint-markdown:
    name: "P10 · Markdown Lint"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Lint Markdown files
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: "**/*.md"

  # ── P9/P10: Secret scanning (FAIL if secrets detected) ────────────────────
  secret-scan:
    name: "P9 · Secret Scan (trufflehog)"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for secrets with TruffleHog (filesystem mode)
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh \
            | sh -s -- -b /usr/local/bin
          trufflehog filesystem . --only-verified --fail
          echo "✅ No verified secrets detected."

  # ── P9/P10: License compliance (FAIL if GPL/AGPL detected) ───────────────
  check-licenses:
    name: "P10 · License Compliance"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Check for GPL/AGPL licenses in scripts
        run: |
          echo "Checking SPDX headers and license files..."
          # Verify project license is MIT
          if ! grep -q "MIT License" LICENSE; then
            echo "FAIL: LICENSE file does not contain MIT License"
            exit 1
          fi
          echo "✅ License check passed (MIT)."

  # ── P10: Governance self-consistency check ────────────────────────────────
  check-governance:
    name: "P10 · Governance Self-Consistency"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Verify GOVERNANCE-CONSTITUTION.md is present and non-empty
        run: |
          [ -s GOVERNANCE-CONSTITUTION.md ] || { echo "FAIL: GOVERNANCE-CONSTITUTION.md missing or empty"; exit 1; }
          LINES=$(wc -l < GOVERNANCE-CONSTITUTION.md)
          echo "Constitution: $LINES lines"
          [ "$LINES" -gt 100 ] || { echo "FAIL: Constitution appears truncated (<100 lines)"; exit 1; }
          echo "✅ Governance constitution present and intact."

      - name: Verify all 14 Prompts present in Constitution
        run: |
          MISSING=0
          for i in $(seq 1 14); do
            if ! grep -q "PROMPT $i:" GOVERNANCE-CONSTITUTION.md; then
              echo "❌ MISSING: Prompt $i not found in Constitution"
              MISSING=1
            else
              echo "✅ Prompt $i present"
            fi
          done
          [ $MISSING -eq 0 ] || exit 1

  # ── P10: ADR completeness check ───────────────────────────────────────────
  check-adrs:
    name: "P10 · ADR Completeness"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Verify required ADRs exist
        run: |
          MISSING=0
          REQUIRED_ADRS=(
            "ADR-0001" "ADR-0002"
            "ADR-0032" "ADR-0033" "ADR-0034" "ADR-0035"
            "ADR-0036" "ADR-0037" "ADR-0038" "ADR-0039"
            "ADR-0040" "ADR-0041" "ADR-0042" "ADR-0043"
            "ADR-0044" "ADR-0045" "ADR-0046" "ADR-0047"
            "ADR-0048" "ADR-0049" "ADR-0050" "ADR-0051"
            "ADR-0052" "ADR-0053" "ADR-0054" "ADR-0055"
            "ADR-0056" "ADR-0057" "ADR-0058"
          )
          for adr in "${REQUIRED_ADRS[@]}"; do
            if ! ls docs/adr/${adr}* 2>/dev/null | grep -q .; then
              echo "❌ MISSING: $adr"
              MISSING=1
            else
              echo "✅ $adr present"
            fi
          done
          [ $MISSING -eq 0 ] || exit 1

  # ── P9/P10: Security policy check ─────────────────────────────────────────
  check-security-policy:
    name: "P9 · Security Policy"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Verify SECURITY.md has required sections
        run: |
          MISSING=0
          REQUIRED_SECTIONS=(
            "Reporting a Vulnerability"
            "security@vayupress.com"
            "72 hours"
            "CVSS"
            "Supported Versions"
          )
          for section in "${REQUIRED_SECTIONS[@]}"; do
            if ! grep -q "$section" SECURITY.md; then
              echo "❌ MISSING section: $section"
              MISSING=1
            else
              echo "✅ Section present: $section"
            fi
          done
          [ $MISSING -eq 0 ] || exit 1

  # ── P12/P10: Ethical compliance check ─────────────────────────────────────
  check-ethics:
    name: "P12 · Ethical Compliance"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Verify ETHICS.md has Ethical AI Charter
        run: |
          MISSING=0
          REQUIRED=(
            "Ethical AI Charter"
            "User Consent"
            "No Training on User Data"
            "Local-First"
            "No Autonomous Actions"
            "ethics@vayupress.com"
          )
          for item in "${REQUIRED[@]}"; do
            if ! grep -q "$item" ETHICS.md; then
              echo "❌ MISSING: $item"
              MISSING=1
            else
              echo "✅ $item present"
            fi
          done
          [ $MISSING -eq 0 ] || exit 1

      - name: Check no tracking scripts in deploy config
        run: |
          # Ensure no Google Analytics, Facebook Pixel, etc.
          TRACKERS="google-analytics|gtag|ga\\.js|fbq|facebook\.net/tr|clarity\.ms|hotjar"
          if grep -rE "$TRACKERS" scripts/ 2>/dev/null; then
            echo "FAIL: Tracking scripts detected — violates Privacy by Design (Prompt 12)"
            exit 1
          fi
          echo "✅ No tracking scripts detected."

  # ── P11: Contributor process check ────────────────────────────────────────
  check-community:
    name: "P11 · Community Governance"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Verify community health files
        run: |
          MISSING=0
          FILES=(
            CODE_OF_CONDUCT.md
            CONTRIBUTING.md
            .github/CODEOWNERS
            .github/FUNDING.yml
            .github/pull_request_template.md
            .github/ISSUE_TEMPLATE/bug_report.yml
            .github/ISSUE_TEMPLATE/feature_request.yml
            .github/ISSUE_TEMPLATE/rfc_proposal.yml
          )
          for f in "${FILES[@]}"; do
            [ -f "$f" ] && echo "✅ $f" || { echo "❌ MISSING: $f"; MISSING=1; }
          done
          [ $MISSING -eq 0 ] || exit 1

      - name: Verify RFC template exists
        run: |
          [ -f "docs/rfc-template.md" ] || { echo "FAIL: docs/rfc-template.md missing (Prompt 11)"; exit 1; }
          echo "✅ RFC template present."

  # ── P10: Binary size baseline check (advisory for this repo) ──────────────
  check-deploy-script:
    name: "P10 · Deploy Script Validation"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Validate deploy script structure
        run: |
          # Check the deploy script has all required sections
          MISSING=0
          REQUIRED_SECTIONS=(
            "ENGINE_VERSION"
            "set -euo pipefail"
            "dry-run"
            "upgrade"
            "PRAGMA integrity_check"
            "BACKUP_RETAIN_DAYS"
            "STORAGE_QUOTA"
          )
          for s in "${REQUIRED_SECTIONS[@]}"; do
            if ! grep -qF "$s" scripts/deploy-vayupress.sh; then
              echo "❌ MISSING: $s"
              MISSING=1
            else
              echo "✅ $s"
            fi
          done
          [ $MISSING -eq 0 ] || exit 1

      - name: Check deploy script line count is reasonable
        run: |
          LINES=$(wc -l < scripts/deploy-vayupress.sh)
          echo "Deploy script: $LINES lines"
          [ "$LINES" -gt 1000 ] || { echo "WARN: Deploy script seems too short"; }
          echo "✅ Deploy script size OK"

  # ── P13: Source parity — embedded heredoc MUST match cmd/vayupress/main.go ──
  check-source-sync:
    name: "P13 · Source Sync (no drift)"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Verify cmd/vayupress/main.go matches the deploy script heredoc
        run: |
          chmod +x scripts/sync-source.sh
          scripts/sync-source.sh --check

  # ── P13/P16: Native Go tooling — build, vet, fmt, test, vuln scan, static analysis ──
  go-native:
    name: "P16 · Native Go Build/Vet/Test/Staticcheck"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: go vet
        run: go vet ./...
      - name: gofmt (must be clean)
        run: |
          OUT=$(gofmt -l .)
          if [ -n "$OUT" ]; then
            echo "❌ gofmt issues in:"; echo "$OUT"; exit 1
          fi
          echo "✅ gofmt clean"
      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          "$(go env GOPATH)/bin/staticcheck" ./...
      - name: go build (race)
        run: go build -race ./...
      - name: go test (race)
        run: go test -race ./... -count=1
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...

  # ── Link check (advisory) ──────────────────────────────────────────────────
  check-links:
    name: "Advisory · Link Check"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Check Markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: yes
          config-file: .github/mlc_config.json
        continue-on-error: true

  # ── All required checks must pass ─────────────────────────────────────────
  ci-pass:
    name: "CI Pass — All Required Checks"
    needs:
      - check-docs
      - lint-shell
      - lint-markdown
      - secret-scan
      - check-licenses
      - check-governance
      - check-adrs
      - check-security-policy
      - check-ethics
      - check-community
      - check-deploy-script
      - check-source-sync
      - go-native
    runs-on: ubuntu-24.04
    if: always()
    steps:
      - name: Verify all required checks passed
        run: |
          FAILED=0
          RESULTS=(
            "${{ needs.check-docs.result }}"
            "${{ needs.lint-shell.result }}"
            "${{ needs.lint-markdown.result }}"
            "${{ needs.secret-scan.result }}"
            "${{ needs.check-licenses.result }}"
            "${{ needs.check-governance.result }}"
            "${{ needs.check-adrs.result }}"
            "${{ needs.check-security-policy.result }}"
            "${{ needs.check-ethics.result }}"
            "${{ needs.check-community.result }}"
            "${{ needs.check-deploy-script.result }}"
            "${{ needs.check-source-sync.result }}"
            "${{ needs.go-native.result }}"
          )
          NAMES=(
            "check-docs" "lint-shell" "lint-markdown" "secret-scan"
            "check-licenses" "check-governance" "check-adrs"
            "check-security-policy" "check-ethics" "check-community"
            "check-deploy-script" "check-source-sync" "go-native"
          )
          for i in "${!RESULTS[@]}"; do
            if [ "${RESULTS[$i]}" != "success" ]; then
              echo "❌ FAILED: ${NAMES[$i]} (${RESULTS[$i]})"
              FAILED=1
            else
              echo "✅ ${NAMES[$i]}"
            fi
          done
          [ $FAILED -eq 0 ] || { echo ""; echo "CI FAILED — see above for details."; exit 1; }
          echo ""
          echo "✅ All CI checks passed. Ready to merge."
