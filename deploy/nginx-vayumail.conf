# VayuPress — Nginx server block for the MAIL host (mail.<domain>)
#
# WHY THIS FILE EXISTS
# --------------------
# A mail client (Gmail app, Apple Mail, Thunderbird, Outlook) connects to your
# mail host — mail.<domain> — on the IMAP/POP3/SMTP ports (993/995/587/143…).
# Those ports are served directly by VayuMail (inside the VayuPress binary), but
# the TLS certificate they present must be CA-signed for mail.<domain> or the
# app refuses the connection with "Couldn't open connection to server".
#
# The clean, zero-downtime way to obtain that certificate is the HTTP-01
# webroot challenge: certbot writes a token under
#   /var/cache/vayupress/.well-known/acme-challenge/
# and Let's Encrypt fetches it over http://mail.<domain>/.well-known/...
#
# But your existing nginx vhost only answers for `server_name johal.in
# www.johal.in`, so a request to mail.<domain> would NOT match it and the
# challenge would 404. This file adds the missing server block for the mail
# host so `certbot --webroot -w /var/cache/vayupress -d mail.<domain>` succeeds
# and auto-renews — with no nginx downtime and no need to stop the service.
#
# INSTALL
#   1. Replace every "johal.in" below with your domain (or let
#      deploy/vayumail-setup.sh do it for you).
#   2. Save as            /etc/nginx/sites-available/mail.johal.in
#   3. Symlink:           ln -s /etc/nginx/sites-available/mail.johal.in \
#                                /etc/nginx/sites-enabled/mail.johal.in
#   4. Create the webroot: mkdir -p /var/cache/vayupress/.well-known/acme-challenge
#   5. Apply:             sudo nginx -t && sudo systemctl reload nginx
#   6. Issue the cert:    sudo certbot certonly --webroot \
#                              -w /var/cache/vayupress -d mail.johal.in
#   7. Point VayuMail at it (in /etc/vayupress/env), then restart the service:
#         VAYUOS_MAIL_TLS_CERT=/etc/letsencrypt/live/mail.johal.in/fullchain.pem
#         VAYUOS_MAIL_TLS_KEY=/etc/letsencrypt/live/mail.johal.in/privkey.pem
#      VayuMail HOT-RELOADS this certificate, so future renewals are picked up
#      automatically with no restart.
#
# NOTE: This vhost intentionally serves ONLY the ACME challenge over plain HTTP.
# It does not proxy the mail ports — those are raw IMAP/SMTP/POP3 handled by
# VayuMail directly, not HTTP, and must not pass through nginx.

server {
    listen 80;
    listen [::]:80;
    server_name mail.johal.in;

    # ── ACME HTTP-01 challenge (issuance + auto-renewal) ─────────────────────
    # Served straight from the shared webroot; certbot --webroot writes tokens
    # here. Same directory the main site already uses, so one webroot covers
    # every certificate on the host.
    location ^~ /.well-known/acme-challenge/ {
        root /var/cache/vayupress;
        default_type text/plain;
        try_files $uri =404;
    }

    # ── Native VayuMail ACME (optional, fully self-contained) ────────────────
    # If you prefer VayuPress to provision the mail certificate ITSELF (no
    # certbot), enable native ACME instead and let nginx forward the challenge
    # to the binary's internal HTTP-01 responder:
    #
    #   In /etc/vayupress/env:
    #     VAYUOS_MAIL_TLS_ACME=on
    #     VAYUOS_MAIL_ACME_EMAIL=admin@johal.in
    #     VAYUOS_MAIL_ACME_HTTP_ADDR=127.0.0.1:8089
    #
    #   Then COMMENT OUT the webroot location above and UNCOMMENT this block:
    #
    # location ^~ /.well-known/acme-challenge/ {
    #     proxy_pass http://127.0.0.1:8089;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }

    # Everything else on the bare mail host just redirects to the main site.
    location / {
        return 301 https://johal.in$request_uri;
    }

    access_log /var/log/nginx/vayumail-access.log;
    error_log  /var/log/nginx/vayumail-error.log warn;
}
