# VayuPress v1.7.0 — Nginx reverse proxy config
# Place at /etc/nginx/sites-available/vayupress
# Then: ln -s /etc/nginx/sites-available/vayupress /etc/nginx/sites-enabled/
# Then: certbot --nginx -d yourdomain.com && nginx -t && systemctl reload nginx

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=global:10m rate=60r/s;
limit_req_zone $binary_remote_addr zone=api:10m    rate=20r/s;
limit_req_zone $binary_remote_addr zone=admin:10m  rate=10r/s;
limit_req_zone $binary_remote_addr zone=login:10m  rate=5r/m;

# Upstream — single VayuPress process
upstream vayupress {
    server 127.0.0.1:8080;
    keepalive 32;
}

# HTTP → HTTPS redirect (enable after certbot sets up SSL)
# Before certbot: comment out this block and uncomment the HTTP proxy block below.
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;
    return 301 https://$host$request_uri;
}

# HTTP-only proxy block — use before SSL is configured.
# Comment out the block above and uncomment this one until certbot succeeds.
