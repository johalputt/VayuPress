# VayuPress — Nginx reverse proxy config for johal.in
# Place at /etc/nginx/sites-available/johal.in
# Symlink: ln -s /etc/nginx/sites-available/johal.in /etc/nginx/sites-enabled/johal.in
# Apply:   sudo nginx -t && sudo systemctl reload nginx

# ── Backend upstream (restart-resilient) ─────────────────────────────────────
# The SAME backend is listed twice so nginx can retry an in-flight idempotent
# request on the second "peer" during a brief (sub-second) restart instead of
# surfacing a 502. max_fails=0 means a peer is never marked permanently down.
# keepalive reuses upstream connections to cut latency. POSTs are NOT retried
# (nginx never retries non-idempotent methods), so this can't double-write.
upstream vayupress_app {
    server 127.0.0.1:8080 max_fails=0;
    server 127.0.0.1:8080 max_fails=0;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name johal.in www.johal.in;

    # ACME challenge — served from filesystem, not proxied to VayuPress
    location ^~ /.well-known/acme-challenge/ {
        root /var/cache/vayupress;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name johal.in www.johal.in;

    # TLS — managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/johal.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/johal.in/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    # Note: CSP is set per-request by VayuPress with a nonce — do not set it here

    # ── Performance ───────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/json application/xml+rss;

    client_max_body_size 50M;
    proxy_read_timeout   60s;
    proxy_send_timeout   30s;
    proxy_connect_timeout 10s;

    # ── ACME challenge (renewals) ────────────────────────────────────────────
    location ^~ /.well-known/acme-challenge/ {
        root /var/cache/vayupress;
        default_type text/plain;
        try_files $uri =404;
    }

    # ── WebSocket (VayuOS live monitoring) ───────────────────────────────────
    location /os/ws {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_read_timeout 3600s;
    }

    # ── Health check ─────────────────────────────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:8080;
        proxy_buffering off;
        access_log off;
    }

    # ── Everything else → VayuPress ──────────────────────────────────────────
    location / {
        proxy_pass http://vayupress_app;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_pass_header X-CSRF-Token;

        # Restart resilience: retry an idempotent request on the second upstream
        # peer if the first connection fails/times out during a deploy. Bounded
        # so a genuinely-down backend still fails fast.
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 8s;
    }

    access_log /var/log/nginx/vayupress-access.log;
    error_log  /var/log/nginx/vayupress-error.log warn;
}
