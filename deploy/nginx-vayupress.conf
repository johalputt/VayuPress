server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # ── TLS (managed by Certbot) ─────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Security headers ─────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    nosniff always;
    add_header X-Frame-Options           SAMEORIGIN always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── Nginx performance ────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/json application/xml+rss
               image/svg+xml;

    client_max_body_size 50M;   # media uploads
    proxy_read_timeout   30s;
    proxy_send_timeout   30s;
    proxy_connect_timeout 5s;

    # ── Rate limiting ────────────────────────────────────────────────────
    location /os/login {
        limit_req zone=login burst=3 nodelay;
        proxy_pass http://vayupress;
        include /etc/nginx/proxy_params;
    }

    location /os/api/ {
        limit_req zone=admin burst=20 nodelay;
        proxy_pass http://vayupress;
        include /etc/nginx/proxy_params;
    }

    location /api/ {
        limit_req zone=api burst=40 nodelay;
        proxy_pass http://vayupress;
        include /etc/nginx/proxy_params;
    }

    # ── Main proxy ───────────────────────────────────────────────────────
    location / {
        limit_req zone=global burst=120 nodelay;
        proxy_pass http://vayupress;
        include /etc/nginx/proxy_params;

        # Keep-alive to upstream (critical for Go performance)
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Static asset caching
        location ~* \.(css|js|woff2?|ttf|png|jpg|ico|svg|webp)$ {
            proxy_pass http://vayupress;
            proxy_cache_valid 200 30d;
            add_header Cache-Control "public, max-age=2592000, immutable";
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }

    # ── WebSocket (live reload / monitoring) ─────────────────────────────
    location /os/ws {
        proxy_pass http://vayupress;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    # ── Access logs ──────────────────────────────────────────────────────
    access_log /var/log/nginx/vayupress-access.log;
    error_log  /var/log/nginx/vayupress-error.log warn;
}
