# VayuPress — Nginx reverse proxy config for johal.in
# Place at /etc/nginx/sites-available/johal.in
# Then: ln -s /etc/nginx/sites-available/johal.in /etc/nginx/sites-enabled/johal.in
# Then: sudo nginx -t && sudo systemctl reload nginx

# Rate limiting zones (declare once in http context — put in /etc/nginx/nginx.conf
# or in a file included before this one if your distro loads conf.d/*.conf globally)
# limit_req_zone $binary_remote_addr zone=vayupress_api:10m rate=20r/s;

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name johal.in www.johal.in;

    # ACME challenge for Let's Encrypt renewals — must be served from filesystem,
    # not proxied to VayuPress (VayuPress has no /.well-known route).
    location ^~ /.well-known/acme-challenge/ {
        root /var/cache/vayupress;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name johal.in www.johal.in;

    # TLS — managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/johal.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/johal.in/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), payment=()" always;
    # CSP is emitted by VayuPress with a per-request nonce — do not set it here.

    # Pass CSRF token header through to the app
    proxy_pass_header X-CSRF-Token;

    # ── Nginx performance ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/json application/xml+rss
               image/svg+xml;

    client_max_body_size 50M;
    proxy_read_timeout   60s;
    proxy_send_timeout   30s;
    proxy_connect_timeout 10s;

    # ── ACME challenge (renewals on HTTPS) ───────────────────────────────────
    location ^~ /.well-known/acme-challenge/ {
        root /var/cache/vayupress;
        default_type text/plain;
        try_files $uri =404;
    }

    # ── API rate limiting ─────────────────────────────────────────────────────
    location /api/v1/ {
        limit_req zone=vayupress_api burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── WebSocket (monitoring / live-reload) ─────────────────────────────────
    location /os/ws {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_read_timeout 3600s;
    }

    # ── Static assets — long cache ───────────────────────────────────────────
    location /static/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, immutable, max-age=31536000";
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── Health check (no logging) ────────────────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:8080;
        proxy_buffering off;
        access_log off;
    }

    # ── Main application (catch-all) ─────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    access_log /var/log/nginx/vayupress-access.log;
    error_log  /var/log/nginx/vayupress-error.log warn;
}
